name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Validate Copy Quality
        run: npm run validate:copy-quality -w @pdf-changer/web
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test
