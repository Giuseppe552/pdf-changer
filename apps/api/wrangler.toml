name = "pdf-changer-api"
main = "src/index.ts"
compatibility_date = "2026-02-17"

compatibility_flags = ["nodejs_compat"]

[vars]
APP_ORIGIN = "https://pdfchanger.org"
RP_ID = "pdfchanger.org"
RP_ORIGIN = "https://pdfchanger.org"
RP_NAME = "PDF Changer"

# D1 database UUID — this is NOT a secret. It is a public identifier
# that requires valid Cloudflare API credentials to access. Wrangler
# requires it in the config file; it cannot be moved to env vars.
# See: https://developers.cloudflare.com/d1/
[[d1_databases]]
binding = "DB"
database_name = "pdf-changer"
database_id = "771eb824-584c-4473-aef6-93f818fa50fd"
